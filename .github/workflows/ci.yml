name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: PHP ${{ matrix.php }} / PHPUnit ${{ matrix.phpunit }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # PHPUnit 10 (PHP >= 8.1)
          - php: '8.1'
            phpunit: '^10.0'
          - php: '8.2'
            phpunit: '^10.0'
          - php: '8.3'
            phpunit: '^10.0'

          # PHPUnit 11 (PHP >= 8.2)
          - php: '8.2'
            phpunit: '^11.0'
          - php: '8.3'
            phpunit: '^11.0'
          - php: '8.4'
            phpunit: '^11.0'

          # PHPUnit 12 (PHP >= 8.3)
          - php: '8.3'
            phpunit: '^12.0'
          - php: '8.4'
            phpunit: '^12.0'

          # PHPUnit 13 (PHP >= 8.4)
          - php: '8.4'
            phpunit: '^13.0'

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: |
          composer require phpunit/phpunit:${{ matrix.phpunit }} --no-interaction --no-update
          composer install --no-interaction --prefer-dist

      - name: Run tests
        run: vendor/bin/phpunit

  static-analysis:
    name: PHPStan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse

  code-style:
    name: PHP CS Fixer
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHP CS Fixer
        run: vendor/bin/php-cs-fixer fix --dry-run --diff
